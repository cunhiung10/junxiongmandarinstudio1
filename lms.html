<script>
/* ============================================================

// ── State & Data ──────────────────────────────────────────────

const COURSES = [
  { id:1, title:'HSK 1 Dasar',                level:'HSK 1', lessons:24, status:'done',    pct:100, char:'一', color:'#22c55e' },
  { id:2, title:'HSK 2 Pemula',               level:'HSK 2', lessons:32, status:'done',    pct:100, char:'二', color:'#16a34a' },
  { id:3, title:'HSK 3 Menengah Bawah',       level:'HSK 3', lessons:36, status:'active',  pct:68,  char:'三', color:'#b8312b' },
  { id:4, title:'HSK 3 Persiapan Ujian',      level:'HSK 3', lessons:18, status:'active',  pct:30,  char:'考', color:'#ea7c22' },

const LESSONS = [
  { num:1,  title:'Perkenalan Diri', zh:'自我介绍',        dur:'25 mnt', type:'🗣️', done:true  },
  { num:2,  title:'Di Sekolah',      zh:'在学校',           dur:'30 mnt', type:'📖', done:true  },
  { num:3,  title:'Makanan & Minuman',zh:'食物与饮料',      dur:'28 mnt', type:'🎧', done:true  },
  { num:4,  title:'Hobi & Waktu Luang',zh:'爱好与娱乐',    dur:'35 mnt', type:'📖', done:true  },
  { num:5,  title:'Perjalanan & Transportasi',zh:'旅行与交通',dur:'32 mnt',type:'🎧',done:true },
  { num:6,  title:'Kesehatan & Tubuh',zh:'健康与身体',      dur:'30 mnt', type:'✍️', done:true  },
  { num:7,  title:'Belanja & Harga',  zh:'购物与价格',      dur:'28 mnt', type:'🗣️', done:true  },
  { num:8,  title:'Di Restoran',      zh:'在餐厅',          dur:'35 mnt', type:'🎧', done:false, current:true },
  { num:9,  title:'Cuaca & Musim',    zh:'天气与季节',      dur:'26 mnt', type:'📖', done:false },
  { num:10, title:'Keluarga & Hubungan',zh:'家庭与关系',    dur:'30 mnt', type:'✍️', done:false },
];

let appState = {};

// ── Initialisation ────────────────────────────────────────────
function initLMS() {
  try {
    const saved = localStorage.getItem('jms_lms_state');
    appState = saved ? { ...DEFAULT_STATE, ...JSON.parse(saved) } : { ...DEFAULT_STATE };
    // Deep-merge student object
    appState.student = { ...DEFAULT_STATE.student, ...(appState.student || {}) };
    appState.student.skills = { ...DEFAULT_STATE.student.skills, ...(appState.student?.skills || {}) };
  } catch(e) {
    appState = { ...DEFAULT_STATE };
  }

  // Set today's date on eval modal
  document.getElementById('eval-date').value = new Date().toISOString().split('T')[0];

  updateSidebarUser();
  renderView(appState.currentView || 'dashboard');
}

function saveState() {
  try { localStorage.setItem('jms_lms_state', JSON.stringify(appState)); } catch(e) {}
}

// ── Role Switching ────────────────────────────────────────────
function toggleRole() {
  appState.role = appState.role === 'siswa' ? 'admin' : 'siswa';
  saveState();
  updateSidebarUser();
  document.getElementById('role-switch-btn').textContent = appState.role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('demo-role-label').textContent = appState.role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('admin-nav-section').style.display = appState.role === 'admin' ? '' : 'none';
  if (appState.role === 'admin' && appState.currentView === 'dashboard') {
    renderView('admin');
  } else if (appState.role === 'siswa' && appState.currentView === 'admin') {
    renderView('dashboard');
  } else {
    renderView(appState.currentView);
  }
}

function switchRole(role) {
  appState.role = role;
  saveState();
  updateSidebarUser();
  document.getElementById('role-switch-btn').textContent = role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('demo-role-label').textContent = role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('admin-nav-section').style.display = role === 'admin' ? '' : 'none';
  renderView(appState.currentView);
}

function updateSidebarUser() {
  const isAdmin = appState.role === 'admin';
  document.getElementById('sidebar-name').textContent = isAdmin ? 'Administrator' : appState.student.name;
  document.getElementById('sidebar-avatar').textContent = isAdmin ? 'AD' : appState.student.initials;
  document.getElementById('sidebar-role').textContent = isAdmin ? 'Admin · Pengajar' : `Siswa · ${appState.student.level}`;
  document.getElementById('role-switch-btn').textContent = appState.role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('demo-role-label').textContent = appState.role === 'admin' ? 'Admin' : 'Siswa';
  document.getElementById('admin-nav-section').style.display = appState.role === 'admin' ? '' : 'none';
}

// ── Navigation ────────────────────────────────────────────────
const VIEW_LABELS = {
  dashboard:  'Dashboard',
  courses:    'Kelas Saya',
  vocab:      'Kosakata',
  assessment: 'Penilaian',
  progress:   'Progres',
  laporan:    'Laporan',
  admin:      'Panel Admin',
};

function renderView(viewName) {
  if (viewName === 'dashboard' && appState.role === 'admin') viewName = 'admin';
  appState.currentView = viewName;
  saveState();

  // Update nav active state
  document.querySelectorAll('.lms-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === viewName);
  });

  // Update breadcrumb
  document.getElementById('crumb-current').textContent = VIEW_LABELS[viewName] || viewName;

  // Render content
  const content = document.getElementById('lms-content');
  content.classList.remove('view-animate');
  void content.offsetWidth; // force reflow
  content.classList.add('view-animate');

  switch(viewName) {
    case 'dashboard':  content.innerHTML = buildDashboard(); break;
    case 'courses':    content.innerHTML = buildCourses(); break;
    case 'vocab':      content.innerHTML = buildVocab(); break;
    case 'assessment': content.innerHTML = buildAssessment(); break;
    case 'progress':   content.innerHTML = buildProgress(); break;
    case 'laporan':    content.innerHTML = buildLaporan(); break;
    case 'admin':      content.innerHTML = buildAdmin(); break;
    default:           content.innerHTML = buildDashboard();
  }

  // Post-render
  if (viewName === 'dashboard') initDashboardRings();
  if (viewName === 'progress')  { drawRadarChart(appState.student.skills); drawBarChart(appState.student.monthlyHours); }
  if (viewName === 'courses')   initCourseFilter();
  if (viewName === 'assessment') initAssessmentBars();
}

// ── Mobile Sidebar ────────────────────────────────────────────
function openSidebar() {
  document.getElementById('lms-sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('lms-sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── SVG Progress Ring ─────────────────────────────────────────
function drawProgressRing(el, pct, color) {
  const r = 33;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const fill = el.querySelector('.ring-fill');
  if (!fill) return;
  fill.style.stroke = color;
  fill.setAttribute('stroke-dasharray', circ.toFixed(2));
  fill.setAttribute('stroke-dashoffset', offset.toFixed(2));
}

function initDashboardRings() {
  const { listen, speak, read, write } = appState.student.skills;
  const rings = [
    { id:'ring-listen', pct: listen, color:'#2563eb' },
    { id:'ring-speak',  pct: speak,  color:'#16a34a' },
    { id:'ring-read',   pct: read,   color:'#ea7c22' },
    { id:'ring-write',  pct: write,  color:'#7c3aed' },
  ];
  rings.forEach(r => {
    const el = document.getElementById(r.id);
    if (el) drawProgressRing(el, r.pct, r.color);
  });
}

function initAssessmentBars() {
  const colors = {
    listen:'#2563eb', speak:'#16a34a', read:'#ea7c22', write:'#7c3aed'
  };
  Object.entries(colors).forEach(([key, color]) => {
    const container = document.getElementById(`hist-${key}`);
    if (!container) return;
    // Generate mock history
    const history = [65, 70, 68, 72, appState.student.skills[key]];
    const max = 100;
    container.innerHTML = history.map(v => {
      const h = Math.max(4, Math.round((v / max) * 40));
      return `<div class="score-bar-mini" style="height:${h}px;background:${color};opacity:0.8;"></div>`;
    }).join('');
  });
}

// ── SVG Radar Chart ───────────────────────────────────────────
function drawRadarChart(skills) {
  const el = document.getElementById('radar-chart');
  if (!el) return;

  const axes = [
    { label:'听力', sub:'Mendengar', val: skills.listen },
    { label:'口语', sub:'Berbicara', val: skills.speak  },
    { label:'阅读', sub:'Membaca',   val: skills.read   },
    { label:'书写', sub:'Menulis',   val: skills.write  },
    { label:'词汇', sub:'Kosakata',  val: skills.vocab  },
    { label:'语法', sub:'Tata Bahasa',val:skills.grammar },
  ];
  const n = axes.length;
  const cx = 200, cy = 200, R = 140;
  const levels = 5;
  const toRad = deg => deg * Math.PI / 180;
  const angle = i => toRad(-90 + (360 / n) * i);
  const pt = (i, r) => ({
    x: cx + r * Math.cos(angle(i)),
    y: cy + r * Math.sin(angle(i))
  });
  const ptStr = (i, r) => { const p = pt(i, r); return `${p.x.toFixed(2)},${p.y.toFixed(2)}`; };

  // Background grids
  let gridSVG = '';
  for (let l = 1; l <= levels; l++) {
    const r = (R / levels) * l;
    const poly = Array.from({length: n}, (_, i) => ptStr(i, r)).join(' ');
    gridSVG += `<polygon points="${poly}" fill="none" stroke="#e5e0d8" stroke-width="${l===levels?1.5:1}"/>`;
    // Level label at top
    const topPt = pt(0, r);
    gridSVG += `<text x="${topPt.x + 4}" y="${topPt.y}" font-size="9" fill="#8a7d6f" font-family="'JetBrains Mono',monospace">${l*20}</text>`;
  }

  // Axis lines
  let axisLines = '';
  for (let i = 0; i < n; i++) {
    const outer = pt(i, R);
    axisLines += `<line x1="${cx}" y1="${cy}" x2="${outer.x.toFixed(2)}" y2="${outer.y.toFixed(2)}" stroke="#dbd5cc" stroke-width="1"/>`;
  }

  // Data polygon
  const dataPoints = axes.map((a, i) => ptStr(i, (a.val / 100) * R)).join(' ');

  // Labels
  let labels = '';
  axes.forEach((a, i) => {
    const labelR = R + 28;
    const lp = pt(i, labelR);
    const anchor = lp.x < cx - 5 ? 'end' : lp.x > cx + 5 ? 'start' : 'middle';
    labels += `<text x="${lp.x.toFixed(2)}" y="${(lp.y - 6).toFixed(2)}" text-anchor="${anchor}" font-size="13" font-weight="700" fill="#1a1714" font-family="'Noto Serif SC','Source Serif 4',serif">${a.label}</text>`;
    labels += `<text x="${lp.x.toFixed(2)}" y="${(lp.y + 8).toFixed(2)}" text-anchor="${anchor}" font-size="9.5" fill="#8a7d6f" font-family="'Plus Jakarta Sans',sans-serif">${a.val}</text>`;
  });

  el.innerHTML = `
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="radar-svg">
      <defs>
        <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#b8312b" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#b8312b" stop-opacity="0.08"/>
        </radialGradient>
      </defs>
      ${gridSVG}
      ${axisLines}
      <polygon points="${dataPoints}" fill="url(#radarGrad)" stroke="#b8312b" stroke-width="2" stroke-linejoin="round"/>
      ${labels}
    </svg>
  `;
}

// ── SVG Bar Chart ─────────────────────────────────────────────
function drawBarChart(data) {
  const el = document.getElementById('bar-chart');
  if (!el) return;

  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const W = 600, H = 180;
  const padL = 40, padR = 16, padT = 16, padB = 40;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = chartW / data.length;
  const maxVal = Math.max(...data, 1);
  const currentMonth = new Date().getMonth(); // 0-indexed

  let bars = '';
  let xLabels = '';
  let yGrid = '';

  // Y-axis grid lines
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (chartH / 4) * i;
    const val = Math.round((maxVal / 4) * i);
    yGrid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e5e0d8" stroke-width="1"/>`;
    yGrid += `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" font-size="9" fill="#8a7d6f" font-family="'JetBrains Mono',monospace">${val}</text>`;
  }

  data.forEach((v, i) => {
    const bH = v > 0 ? Math.max(4, (v / maxVal) * chartH) : 0;
    const x = padL + i * barW + barW * 0.15;
    const bW = barW * 0.7;
    const y = padT + chartH - bH;
    const isCurrent = i === currentMonth;
    const isFuture = v === 0;

    if (v > 0) {
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}"
        fill="${isCurrent ? '#b8312b' : '#d4796e'}" rx="3" opacity="${isFuture ? 0.3 : 1}"/>`;
      bars += `<text x="${(x + bW/2).toFixed(1)}" y="${(y - 4).toFixed(1)}" text-anchor="middle"
        font-size="8" fill="#5a4f44" font-family="'JetBrains Mono',monospace">${v}</text>`;
    } else {
      bars += `<rect x="${x.toFixed(1)}" y="${(padT + chartH - 3).toFixed(1)}" width="${bW.toFixed(1)}" height="3"
        fill="#e5e0d8" rx="1.5"/>`;
    }
    xLabels += `<text x="${(padL + i * barW + barW / 2).toFixed(1)}" y="${H - 8}" text-anchor="middle"
      font-size="9.5" fill="${isCurrent ? '#b8312b' : '#8a7d6f'}" font-weight="${isCurrent ? '600' : '400'}"
      font-family="'Plus Jakarta Sans',sans-serif">${months[i]}</text>`;
  });

  el.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
      ${yGrid}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="#dbd5cc" stroke-width="1.5"/>
      <line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#dbd5cc" stroke-width="1.5"/>
      ${bars}
      ${xLabels}
    </svg>
  `;
}

// ── Evaluation Modal ──────────────────────────────────────────
function openEvalModal(studentId) {
  const student = STUDENTS.find(s => s.id === studentId);
  if (!student) return;

  document.getElementById('eval-student-id').value = studentId;
  document.getElementById('eval-modal-title').textContent = `Penilaian: ${student.name}`;
  document.getElementById('eval-modal-sub').textContent = `Level saat ini: ${student.level}`;
  document.getElementById('eval-listen').value = student.listen;
  document.getElementById('eval-speak').value  = student.speak;
  document.getElementById('eval-read').value   = student.read;
  document.getElementById('eval-write').value  = student.write;

  // Try to load saved data
  try {
    const saved = JSON.parse(localStorage.getItem(`jms_eval_${studentId}`) || '{}');
    if (saved.notes)  document.getElementById('eval-notes').value = saved.notes;
    if (saved.level)  document.getElementById('eval-level').value = saved.level;
  } catch(e) {}

  document.getElementById('eval-level').value = student.level;
  document.getElementById('eval-modal').classList.add('open');
}

function closeEvalModal() {
  document.getElementById('eval-modal').classList.remove('open');
}

function saveEvaluation() {
  const id   = document.getElementById('eval-student-id').value;
  const data = {
    listen: +document.getElementById('eval-listen').value,
    speak:  +document.getElementById('eval-speak').value,
    read:   +document.getElementById('eval-read').value,
    write:  +document.getElementById('eval-write').value,
    notes:  document.getElementById('eval-notes').value,
    level:  document.getElementById('eval-level').value,
    date:   document.getElementById('eval-date').value,
    saved:  new Date().toISOString()
  };

  // Validate
  const vals = [data.listen, data.speak, data.read, data.write];
  if (vals.some(v => isNaN(v) || v < 0 || v > 100)) {
    alert('Nilai harus antara 0 dan 100.');
    return;
  }

  try { localStorage.setItem(`jms_eval_${id}`, JSON.stringify(data)); } catch(e) {}

  // Update student in memory
  const student = STUDENTS.find(s => s.id === +id);
  if (student) {
    student.listen = data.listen;
    student.speak  = data.speak;
    student.read   = data.read;
    student.write  = data.write;
    student.level  = data.level;
  }

  closeEvalModal();
  // Refresh admin view
  const content = document.getElementById('lms-content');
  content.innerHTML = buildAdmin();

  // Show success feedback
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;font-size:.875rem;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:600;';
  banner.textContent = `✓ Penilaian ${student?.name} berhasil disimpan`;
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 3000);
}

function ringCard(id, label, labelId, score, colorClass) {
  const r = 33, circ = (2 * Math.PI * r).toFixed(2);
  const colors = { listen:'#2563eb', speak:'#16a34a', read:'#ea7c22', write:'#7c3aed' };

        <circle class="ring-track" cx="40" cy="40" r="${r}"/>
        <circle class="ring-fill" cx="40" cy="40" r="${r}"
          stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="ring-score">${score}</div>
    </div>
    <div class="skill-zh">${label}</div>
    <div class="skill-id">${labelId}</div>
    <span class="skill-badge ${id}">${score}/100</span>

}

function buildCourseCards(filter) {
  const filtered = filter === 'all' ? COURSES :
    filter === 'active'  ? COURSES.filter(c => c.status === 'active')  :
    filter === 'done'    ? COURSES.filter(c => c.status === 'done')    :
    COURSES.filter(c => c.status === 'locked');

  if (!filtered.length) return '<div class="text-sm text-muted" style="padding:20px">Tidak ada kursus di kategori ini.</div>';

  return filtered.map(c => {
    const statusMap = { done:'Selesai ✅', active:'Sedang Belajar 🔵', locked:'Belum Mulai 🔒' };
    const badgeMap  = { done:'badge-green', active:'badge-blue', locked:'badge-gray' };
    const btnMap    = { done:'Lihat Lagi', active:'Lanjutkan', locked:'Mulai' };
    const btnStyleMap = { done:'btn-ghost', active:'btn-primary', locked:'btn-ghost' };

    return `
    <div class="course-card">
      <div class="course-cover" style="background:${c.color}">
        <div class="course-cover-char">${c.char}</div>
        <div class="course-cover-badge">
          <span class="badge ${badgeMap[c.status]}">${statusMap[c.status]}</span>
        </div>
      </div>
      <div class="course-body">
        <div class="course-title">${c.title}</div>
        <div class="course-meta">${c.lessons} pelajaran · ${c.level}</div>
        <div class="course-progress-row">
          <div class="progress-bar">
            <div class="progress-fill ${c.status==='done'?'green':c.status==='active'?'red':'gray'}" style="width:${c.pct}%"></div>
          </div>
          <span class="course-pct">${c.pct}%</span>
        </div>
        <button class="btn-sm ${btnStyleMap[c.status]} w-full"
          onclick="${c.status==='locked'?`alert('Selesaikan kursus sebelumnya untuk membuka kursus ini.')`:`renderView('courses')`}"
          style="margin-top:4px;">
          ${c.status==='locked'?'🔒 Terkunci':btnMap[c.status]}
        </button>
      </div>
    </div>`;
  }).join('');
}

    { level:'HSK 6', total:2663,  mastered:0,    learning:0,   remaining:2663 },
  ];

  const timelineNodes = [
    { label:'HSK 1', date:'Mar 2024', done:true  },
    { label:'HSK 2', date:'Okt 2024', done:true  },
    { label:'HSK 3', date:'Saat ini', done:false, current:true },
    { label:'HSK 4', date:'',         done:false },
    { label:'HSK 5', date:'',         done:false },
    { label:'HSK 6', date:'',         done:false },
  ];

  const timelineHTML = timelineNodes.map((n, i) => `
    ${i > 0 ? `<div class="timeline-connector ${timelineNodes[i-1].done ? 'done' : ''}"></div>` : ''}
    <div class="timeline-node">
      <div class="timeline-circle ${n.current ? 'current' : n.done ? 'done' : 'future'}">${n.label}</div>

      <div class="timeline-date">${n.date || '—'}</div>

  const vocabTableRows = vocabRows.map(r => {
    const mastPct = r.total > 0 ? Math.round((r.mastered / r.total) * 100) : 0;
    return `
    <tr>
      <td><span class="badge badge-cinnabar">${r.level}</span></td>
      <td class="font-mono">${r.total.toLocaleString('id')}</td>
      <td class="font-mono text-sm" style="color:#16a34a">${r.mastered.toLocaleString('id')}</td>

      <td class="vocab-progress-cell">
        <div class="progress-bar"><div class="progress-fill ${mastPct===100?'green':'red'}" style="width:${mastPct}%"></div></div>
        <div class="text-xs text-muted mt-4">${mastPct}%</div>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="view-header">
    <div class="view-title">Progres 进步</div>
    <div class="view-subtitle">Perjalanan belajar Mandarin Anda dari awal hingga sekarang</div>

// ── Student Table Filter ──────────────────────────────────────
function filterStudentTable(query) {
  const tbody = document.getElementById('student-tbody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const q = query.toLowerCase();
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
